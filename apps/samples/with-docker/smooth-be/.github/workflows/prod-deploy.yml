    - name: Download Dependencies and Generate Build
      run: |
        npm install && npm run build

    - name: Create SSH directory and known_hosts file
      run: |
        mkdir -p ~/.ssh
        touch ~/.ssh/known_hosts
        touch ~/.ssh/id_rsa
        touch ~/.ssh/id_rsa.pub
        pwd
    - name: Run SSH command
      run: |
        ssh-keyscan -H ${{ secrets.SSH_PROD_HOST }} >> ~/.ssh/known_hosts
        echo "${{ secrets.SSH_PROD_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        echo "${{ secrets.SSH_PROD_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
        chmod 600 ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa.pub
        rsync -avz --exclude='node_modules/' --exclude='.git/' /home/runner/work/SMOOTH-BALLOT-BE/SMOOTH-BALLOT-BE/ owoade@${{ secrets.SSH_PROD_HOST }}:~/SMOOTH-BALLOT-BE/
        ssh owoade@${{ secrets.SSH_PROD_HOST }} "cd SMOOTH-BALLOT-BE && npm install && npm run migrate:prod && pm2 restart api && pm2 restart api-2 && pm2 restart api-3"

