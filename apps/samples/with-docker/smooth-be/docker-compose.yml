version: "3.9"

services:
  app1:
    build: .
    container_name: app1
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000

  app2:
    build: .
    container_name: app2
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      PORT: 4000
      RUN_CRON: "true"

  app3:
    build: .
    container_name: app3
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: 5000