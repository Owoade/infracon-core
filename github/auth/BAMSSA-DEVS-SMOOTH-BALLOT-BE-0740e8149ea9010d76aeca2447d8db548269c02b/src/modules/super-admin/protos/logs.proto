syntax = "proto3";

package logs;

service LogService {
  rpc getLogs(GetLogsRequest) returns (GetLogsResponse) {}
}

message GetLogsRequest {
  int32 UserId = 1;
  Date date = 2;
  int32 page = 3;
  int32 perPage = 4;
  string type = 5;
}

message Date {
    string from = 1;
    string to = 2;
}

message GetLogsResponse {
  string status = 1;
  repeated Log logs = 2;
}

message Log {
  int32 UserId = 1;
  string description = 2;
  string createdAt = 3;
  string type = 4;
}
